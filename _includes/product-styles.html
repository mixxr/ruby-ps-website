<div class="styles">
	{% for style in include.product.styles %}
		<div class="style" data-item-id="{{ forloop.index }}" {% unless forloop.first %}style="display: none"{% endunless %}>
			<a href="{{ include.product.url }}">
				<img src="{{ site.baseurl }}{{ style.image }}">
			</a>
		</div>
	{% endfor %}
	{% if include.product.styles.size > 1 %}
	<div class="style-picker">
		{% for style in include.product.styles %}
			<div style="background-color: {{ style.color }}" data-item-id="{{ forloop.index }}" class="tooltip">
				<span class="tooltiptext">{{ style.name }}</span>
			</div>
		{% endfor %}
	</div>
	{% endif %}
</div>
